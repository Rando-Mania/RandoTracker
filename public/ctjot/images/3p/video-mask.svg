<svg width='1280' height='720' viewBox='0 0 1280 720' version='1.1' xmlns='http://www.w3.org/2000/svg'>
  <style>
    .player-1, .player-2, .player-3{fill: #000;}
    .video{
      x: 18px;
      y: 18px;
      width: 420px;
      height: 315px;
    }
	.player-2, .player-3{
		transform-origin: 50% 50%;
	}
    .player-2{
      transform: rotateY(180deg);
    }
	.player-3{
      transform: rotateX(180deg);
    }
  </style>
  <rect fill="#fff" width="1280" height="720"/>
  <rect class="video player-1"/>
  <rect class="video player-2"/>
  <rect class="video player-3"/>
</svg>